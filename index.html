  <title>แดชบอร์ดนวกะ3</title>
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      /* ใช้ dvh เพื่อคำนวณความสูงตามพื้นที่หน้าจอที่เหลืออยู่จริงของแต่ละเบราว์เซอร์ */

    iframe {
      width: 100%;
      /* ปรับ iframe ให้ใช้ความสูงแบบ dvh ด้วยเช่นกัน */

      border: none;
      display: block;
    }
